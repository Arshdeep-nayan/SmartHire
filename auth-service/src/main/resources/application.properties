spring.application.name=AUTH-SERVICE
server.port=8081

# ==========================
# MySQL Configuration
# ==========================
spring.datasource.url=jdbc:mysql://mysql:3306/smarthire_auth
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA Configuration
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================
# Eureka Configuration
# ==========================
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================
# JWT Configuration
# ==========================
jwt.secret=VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yU21hcnRIaXJlSldUQXV0aA==
jwt.expiration=1800000

# ==========================
# Swagger / OpenAPI
# ==========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================
# OpenAPI Gateway URL
# ==========================
openapi.server.url=http://13.62.16.155:8085

# Logging Levels
logging.level.root=INFO
logging.level.com.smarthire=DEBUG

# Use Log4j2 Configuration
logging.config=classpath:log4j2.xml
