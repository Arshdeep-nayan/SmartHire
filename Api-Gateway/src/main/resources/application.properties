spring.application.name=API-GATEWAY
server.port=8085

# ==========================
# Eureka Configuration
# ==========================
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================
# JWT Configuration
# ==========================
jwt.secret=VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yU21hcnRIaXJlSldUQXV0aA==
jwt.expiration=1800000

# ==========================
# Swagger / OpenAPI
# ==========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.persistAuthorization=true

# =====================================================
# Swagger Gateway Routes
# =====================================================

# Auth Swagger
spring.cloud.gateway.mvc.routes[0].id=auth-swagger
spring.cloud.gateway.mvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth/v3/api-docs
spring.cloud.gateway.mvc.routes[0].filters[0]=RewritePath=/auth/(?<segment>.*),/${segment}

# Job Swagger
spring.cloud.gateway.mvc.routes[1].id=job-swagger
spring.cloud.gateway.mvc.routes[1].uri=lb://JOB-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/jobs/v3/api-docs
spring.cloud.gateway.mvc.routes[1].filters[0]=RewritePath=/jobs/(?<segment>.*),/${segment}

# Candidate Swagger
spring.cloud.gateway.mvc.routes[2].id=candidate-swagger
spring.cloud.gateway.mvc.routes[2].uri=lb://CANDIDATE-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/candidate/v3/api-docs
spring.cloud.gateway.mvc.routes[2].filters[0]=RewritePath=/candidate/(?<segment>.*),/${segment}

# AI Screening Swagger
spring.cloud.gateway.mvc.routes[3].id=screening-swagger
spring.cloud.gateway.mvc.routes[3].uri=lb://AI-SCREENING-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/screening/v3/api-docs
spring.cloud.gateway.mvc.routes[3].filters[0]=RewritePath=/screening/(?<segment>.*),/${segment}

# Notification Swagger
spring.cloud.gateway.mvc.routes[4].id=notification-swagger
spring.cloud.gateway.mvc.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/notification/v3/api-docs
spring.cloud.gateway.mvc.routes[4].filters[0]=RewritePath=/notification/(?<segment>.*),/${segment}

# =====================================================
# Microservice Routes
# =====================================================

# Auth Service
spring.cloud.gateway.mvc.routes[5].id=auth-service
spring.cloud.gateway.mvc.routes[5].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[5].predicates[0]=Path=/api/login,/api/register

# Job Service
spring.cloud.gateway.mvc.routes[6].id=job-service
spring.cloud.gateway.mvc.routes[6].uri=lb://JOB-SERVICE
spring.cloud.gateway.mvc.routes[6].predicates[0]=Path=/jobs/**

# Candidate Service
spring.cloud.gateway.mvc.routes[7].id=candidate-service
spring.cloud.gateway.mvc.routes[7].uri=lb://CANDIDATE-SERVICE
spring.cloud.gateway.mvc.routes[7].predicates[0]=Path=/api/candidate/**,/api/candidates/**

# AI Screening Service
spring.cloud.gateway.mvc.routes[8].id=ai-screening-service
spring.cloud.gateway.mvc.routes[8].uri=lb://AI-SCREENING-SERVICE
spring.cloud.gateway.mvc.routes[8].predicates[0]=Path=/api/screening/**

# Notification Service
spring.cloud.gateway.mvc.routes[9].id=notification-service
spring.cloud.gateway.mvc.routes[9].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.mvc.routes[9].predicates[0]=Path=/api/notification/**

# =====================================================
# Swagger UI Aggregation
# =====================================================

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=Job Service
springdoc.swagger-ui.urls[1].url=/jobs/v3/api-docs

springdoc.swagger-ui.urls[2].name=Candidate Service
springdoc.swagger-ui.urls[2].url=/candidate/v3/api-docs

springdoc.swagger-ui.urls[3].name=AI Screening Service
springdoc.swagger-ui.urls[3].url=/screening/v3/api-docs

springdoc.swagger-ui.urls[4].name=Notification Service
springdoc.swagger-ui.urls[4].url=/notification/v3/api-docs

# ==========================
# Logging Configuration
# ==========================
logging.level.root=INFO
logging.level.com.smarthire=DEBUG
logging.config=classpath:log4j2.xml