spring.application.name=AI-SCREENING-SERVICE
server.port=8084

# ==========================
# MongoDB Configuration
# ==========================
spring.data.mongodb.host=mongo
spring.data.mongodb.port=27017
spring.data.mongodb.database=smarthire_screening

# ==========================
# Spring AI - Google Gemini Configuration
# ==========================
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# ==========================
# Kafka Configuration
# ==========================
spring.kafka.bootstrap-servers=kafka:9092

# Consumer Configuration
spring.kafka.consumer.group-id=screening-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ==========================
# Eureka Configuration
# ==========================
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================
# Swagger Configuration
# ==========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================
# OpenAPI Gateway URL
# ==========================
openapi.server.url=http://13.62.16.155:8085

# Logging Levels
logging.level.root=INFO
logging.level.com.smarthire=DEBUG

# Use Log4j2 Configuration
logging.config=classpath:log4j2.xml